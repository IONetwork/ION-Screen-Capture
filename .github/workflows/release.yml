name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# The npm project lives in src/ (package.json + src-tauri there).
defaults:
  run:
    shell: pwsh
    working-directory: src

jobs:
  # Runs once. Resolves version/tag from tauri.conf.json and ensures a single
  # draft release exists before the matrix fans out (no create race).
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Resolve version and ensure draft release
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $tag = "v$ver"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --draft --title "ION Screen Capture $tag" --notes "Automated build."
          }

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Let AppImage tooling self-extract instead of needing FUSE on the runner.
      # Ignored on Windows.
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/src-tauri

      - name: Install dependencies
        run: npm ci

      # targets:"all" => Windows builds nsis+msi (unchanged), Linux builds
      # deb+rpm+appimage. beforeBuildCommand builds the Svelte frontend.
      - name: Build app + bundles
        run: npm run tauri build

      # Upload THIS OS's artifacts to the draft created by create-release.
      - name: Upload assets to draft release
        env:
          REL_TAG: ${{ needs.create-release.outputs.tag }}
          REL_VER: ${{ needs.create-release.outputs.version }}
        run: |
          $tag = $env:REL_TAG
          $ver = $env:REL_VER
          $rel = "src-tauri/target/release"
          if ($IsWindows) {
            $portable = "ION-Screen-Capture_${ver}_x64-portable.exe"
            Copy-Item "$rel/ion-screen-capture.exe" $portable
            $assets = @(
              (Get-ChildItem "$rel/bundle/nsis/*-setup.exe" | Select-Object -First 1).FullName,
              (Get-ChildItem "$rel/bundle/msi/*.msi"        | Select-Object -First 1).FullName,
              (Resolve-Path $portable).Path
            )
          } else {
            $assets = @(
              (Get-ChildItem "$rel/bundle/deb/*.deb"           | Select-Object -First 1).FullName,
              (Get-ChildItem "$rel/bundle/rpm/*.rpm"           | Select-Object -First 1).FullName,
              (Get-ChildItem "$rel/bundle/appimage/*.AppImage" | Select-Object -First 1).FullName
            )
          }
          gh release upload $tag $assets --clobber
